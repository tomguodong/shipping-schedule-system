<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - 海运船期查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5276;
            --primary-light: #2980b9;
            --primary-dark: #154360;
            --sidebar-bg: #2c3e50;
            --sidebar-hover: #34495e;
            --sidebar-active: #1a252f;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --text-white: #ecf0f1;
            --border: #dce6f0;
            --success: #27ae60;
            --success-bg: #eafaf1;
            --danger: #e74c3c;
            --danger-bg: #fdedec;
            --warning: #f39c12;
            --warning-bg: #fef9e7;
            --info: #3498db;
            --info-bg: #ebf5fb;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all 0.3s ease;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ==================== Login Page ==================== */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            top: -200px; right: -200px;
        }
        .login-page::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            bottom: -100px; left: -100px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-card .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .login-card .logo h2 {
            font-size: 22px;
            color: var(--primary);
            font-weight: 700;
        }
        .login-card .logo p {
            color: var(--text-light);
            font-size: 13px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            color: var(--text);
            transition: var(--transition);
            background: #fafbfc;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(41,128,185,0.15);
            background: white;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group input:read-only {
            background: #f0f0f0;
            cursor: not-allowed;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(26,82,118,0.3);
        }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover {
            background: #219a52;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
        }
        .btn-warning:hover {
            background: #d68910;
        }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-outline:hover {
            border-color: var(--primary-light);
            color: var(--primary);
            background: var(--info-bg);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 15px;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-btn {
            margin-top: 8px;
        }
        .login-hint {
            text-align: center;
            margin-top: 24px;
            padding: 12px;
            background: var(--info-bg);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--primary);
        }
        .login-error {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        /* ==================== Admin Layout ==================== */
        .admin-layout {
            display: none;
            min-height: 100vh;
        }
        .admin-layout.active {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: var(--sidebar-bg);
            color: var(--text-white);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }
        .sidebar-logo {
            padding: 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .sidebar-logo .logo-text {
            font-size: 15px;
            line-height: 1.3;
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }
        .sidebar-nav .nav-section {
            padding: 8px 18px 4px;
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
            font-weight: 600;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            border-left: 3px solid transparent;
            text-decoration: none;
        }
        .sidebar-nav .nav-item:hover {
            background: var(--sidebar-hover);
            color: white;
        }
        .sidebar-nav .nav-item.active {
            background: var(--sidebar-active);
            color: white;
            border-left-color: var(--primary-light);
        }
        .sidebar-nav .nav-item .nav-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
        }
        .sidebar-footer .nav-item {
            font-size: 13px;
        }

        /* Main Content */
        .main-content {
            margin-left: 220px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            background: white;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-left h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }
        .admin-name {
            font-weight: 600;
            font-size: 14px;
        }
        .role-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .role-tag.admin {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .role-tag.user {
            background: var(--info-bg);
            color: var(--info);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 28px;
        }
        .page-section {
            display: none;
        }
        .page-section.active {
            display: block;
        }

        /* ==================== Dashboard ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .stat-icon.blue { background: var(--info-bg); }
        .stat-icon.green { background: var(--success-bg); }
        .stat-icon.orange { background: var(--warning-bg); }
        .stat-icon.purple { background: #f4ecf7; }
        .stat-info h3 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .stat-info p {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* ==================== User Management ==================== */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            max-width: 360px;
        }
        .search-box input {
            flex: 1;
            padding: 9px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
            background: white;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(41,128,185,0.15);
        }

        /* Table */
        .table-wrapper {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        thead {
            background: #f8fafc;
        }
        th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1.5px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            vertical-align: middle;
        }
        tr:hover td {
            background: #fafbfc;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .actions-cell {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-success {
            background: var(--success-bg);
            color: var(--success);
        }
        .tag-danger {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .tag-info {
            background: var(--info-bg);
            color: var(--info);
        }
        .tag-warning {
            background: var(--warning-bg);
            color: var(--warning);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 12px;
        }
        .pagination-info {
            font-size: 13px;
            color: var(--text-light);
        }
        .pagination-btns {
            display: flex;
            gap: 4px;
        }
        .pagination-btns button {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
        }
        .pagination-btns button:hover:not(:disabled) {
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .pagination-btns button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .pagination-btns button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ==================== Settings ==================== */
        .settings-section {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .settings-header {
            padding: 18px 24px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .settings-body {
            padding: 24px;
        }
        .setting-item {
            margin-bottom: 20px;
        }
        .setting-item:last-child {
            margin-bottom: 0;
        }
        .setting-item label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .setting-item .setting-desc {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .setting-item input[type="text"],
        .setting-item textarea {
            width: 100%;
            max-width: 500px;
            padding: 9px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
            font-family: inherit;
        }
        .setting-item input[type="text"]:focus,
        .setting-item textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(41,128,185,0.15);
        }
        .setting-item textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* Toggle Switch */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 24px;
            transition: var(--transition);
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: var(--transition);
        }
        .toggle input:checked + .toggle-slider {
            background: var(--success);
        }
        .toggle input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }
        .toggle-label {
            font-size: 13px;
            color: var(--text);
        }
        .toggle-label.on { color: var(--success); font-weight: 500; }
        .toggle-label.off { color: var(--text-light); }

        .settings-footer {
            padding: 20px 0 0;
            display: flex;
            gap: 12px;
        }

        /* ==================== Modal ==================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal {
            background: white;
            border-radius: 16px;
            width: 480px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text-light);
        }
        .modal-close:hover {
            background: #e0e0e0;
            color: var(--text);
        }
        .modal-body {
            padding: 24px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Confirm Modal */
        .confirm-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.6;
        }
        .confirm-text strong {
            color: var(--danger);
        }

        /* ==================== Toast ==================== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: var(--radius);
            color: white;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            animation: toastIn 0.3s ease;
            min-width: 260px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--info); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ==================== Loading ==================== */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .loading-spinner.dark {
            border-color: rgba(0,0,0,0.1);
            border-top-color: var(--primary);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ==================== Responsive ==================== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .content-area {
                padding: 16px;
            }
            .topbar {
                padding: 12px 16px;
            }
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 12px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: none;
            }
            .mobile-menu-btn {
                display: flex !important;
            }
        }
        .mobile-menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 20px;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .mobile-menu-btn:hover {
            background: #f0f0f0;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 199;
        }
        .sidebar-overlay.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- ==================== Login Page ==================== -->
<div class="login-page" id="loginPage">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">&#128674;</div>
            <h2>后台管理系统</h2>

<!-- ==================== Toast Container ==================== -->
<div class="toast-container" id="toastContainer"></div>

<script>
    // ==================== Global State ====================
    let currentUser = null;
    let usersPage = 1;
    let usersPerPage = 20;
    let usersSearch = '';
    let deleteTargetId = null;
    let resetPwdTargetId = null;
    let searchTimer = null;

    // ==================== API Helper ====================
    function getToken() {
        return localStorage.getItem('admin_token');
    }

    function setToken(token) {
        localStorage.setItem('admin_token', token);
    }

    function removeToken() {
        localStorage.removeItem('admin_token');
    }

    async function api(method, url, data) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) {
            headers['Authorization'] = 'Bearer ' + token;
        }
        const opts = { method, headers };
        if (data !== undefined) {
            opts.body = JSON.stringify(data);
        }
        const res = await fetch(url, opts);
        const json = await res.json();
        if (!res.ok || json.code !== 0) {
            throw new Error(json.message || '请求失败');
        }
        return json;
    }

    // ==================== Toast ====================
    function showToast(message, type) {
        type = type || 'info';
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        const icons = { success: '\u2714', error: '\u2718', info: '\u2139' };
        toast.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + message + '</span>';
        container.appendChild(toast);
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(40px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }

    // ==================== Auth ====================
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        errorEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> 登录中...';

        try {
            const res = await api('POST', '/api/auth/login', { username: username, password: password });
            setToken(res.data.token);
            currentUser = res.data.user;
            showAdminLayout();
            showToast('登录成功', 'success');
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '登 录';
        }
    }

    function handleLogout() {
        removeToken();
        currentUser = null;
        document.getElementById('adminLayout').classList.remove('active');
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('loginForm').reset();
        showToast('已退出登录', 'info');
    }

    function showAdminLayout() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('adminLayout').classList.add('active');

        // Set admin info
        if (currentUser) {
            const name = currentUser.real_name || currentUser.username;
            document.getElementById('adminName').textContent = name;
            document.getElementById('adminAvatar').textContent = name.charAt(0).toUpperCase();
            const roleTag = document.getElementById('adminRole');
            if (currentUser.role === 'admin') {
                roleTag.textContent = '管理员';
                roleTag.className = 'role-tag admin';
            } else {
                roleTag.textContent = '普通用户';
                roleTag.className = 'role-tag user';
            }
        }

        // Load dashboard
        switchPage('dashboard');
    }

    // ==================== Page Navigation ====================
    function switchPage(page) {
        // Update nav
        document.querySelectorAll('.sidebar-nav .nav-item').forEach(function(item) {
            item.classList.toggle('active', item.dataset.page === page);
        });

        // Update page sections
        document.querySelectorAll('.page-section').forEach(function(section) {
            section.classList.remove('active');
        });
        var target = document.getElementById('page-' + page);
        if (target) target.classList.add('active');

        // Update title
        var titles = { dashboard: '仪表盘', users: '用户管理', settings: '系统设置' };
        document.getElementById('pageTitle').textContent = titles[page] || page;

        // Load data
        if (page === 'dashboard') loadDashboard();
        if (page === 'users') loadUsers();
        if (page === 'settings') loadSettings();

        closeSidebar();
    }

    // ==================== Sidebar (Mobile) ====================
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }

    // ==================== Dashboard ====================
    async function loadDashboard() {
        try {
            var usersRes = await api('GET', '/api/admin/users?page=1&perPage=1');
            var users = usersRes.data || [];
            var pagination = usersRes.pagination || {};
            var total = pagination.total || users.length;
            var activeCount = 0;
            var todayLogin = 0;

            // Get full list for stats
            var allRes = await api('GET', '/api/admin/users?page=1&perPage=1000');
            var allUsers = allRes.data || [];
            var today = new Date().toISOString().slice(0, 10);
            allUsers.forEach(function(u) {
                if (u.status === 'active') activeCount++;
                if (u.last_login && u.last_login.slice(0, 10) === today) todayLogin++;
            });

            document.getElementById('statTotalUsers').textContent = total;
            document.getElementById('statActiveUsers').textContent = activeCount;
            document.getElementById('statTodayLogin').textContent = todayLogin;
        } catch (err) {
            document.getElementById('statTotalUsers').textContent = '0';
            document.getElementById('statActiveUsers').textContent = '0';
            document.getElementById('statTodayLogin').textContent = '0';
        }

        try {
            var settingsRes = await api('GET', '/api/admin/settings');
            var settings = settingsRes.data || {};
            var count = Object.keys(settings).length;
            document.getElementById('statSettings').textContent = count;
        } catch (err) {
            document.getElementById('statSettings').textContent = '0';
        }
    }

    // ==================== User Management ====================
    async function loadUsers() {
        var tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">&#128269;</div><p>加载中...</p></div></td></tr>';

        try {
            var url = '/api/admin/users?page=' + usersPage + '&perPage=' + usersPerPage;
            if (usersSearch) url += '&search=' + encodeURIComponent(usersSearch);
            var res = await api('GET', url);
            var users = res.data || [];
            var pagination = res.pagination || {};

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">&#128533;</div><p>暂无用户数据</p></div></td></tr>';
                document.getElementById('userPagination').style.display = 'none';
                return;
            }

            var html = '';
            users.forEach(function(u) {
                var roleClass = u.role === 'admin' ? 'tag-danger' : 'tag-info';
                var roleText = u.role === 'admin' ? '管理员' : '普通用户';
                var statusClass = u.status === 'active' ? 'tag-success' : 'tag-warning';
                var statusText = u.status === 'active' ? '启用' : '禁用';

                html += '<tr>';
                html += '<td>' + u.id + '</td>';
                html += '<td><strong>' + escapeHtml(u.username) + '</strong></td>';
                html += '<td>' + escapeHtml(u.real_name || '-') + '</td>';
                html += '<td>' + escapeHtml(u.company || '-') + '</td>';
                html += '<td><span class="tag ' + roleClass + '">' + roleText + '</span></td>';
                html += '<td><span class="tag ' + statusClass + '">' + statusText + '</span></td>';
                html += '<td>' + (u.created_at || '-') + '</td>';
                html += '<td><div class="actions-cell">';
                html += '<button class="btn btn-outline btn-sm" onclick="openEditUserModal(' + u.id + ')">编辑</button>';
                html += '<button class="btn btn-danger btn-sm" onclick="openDeleteModal(' + u.id + ', \'' + escapeHtml(u.username) + '\')">删除</button>';
                html += '<button class="btn btn-warning btn-sm" onclick="openResetPwdModal(' + u.id + ', \'' + escapeHtml(u.username) + '\')">重置密码</button>';
                html += '</div></td>';
                html += '</tr>';
            });
            tbody.innerHTML = html;

            // Pagination
            var totalPages = pagination.totalPages || 1;
            var total = pagination.total || 0;
            if (totalPages > 1) {
                document.getElementById('userPagination').style.display = 'flex';
                document.getElementById('paginationInfo').textContent =
                    '共 ' + total + ' 条记录，第 ' + pagination.page + '/' + totalPages + ' 页';

                var btnsHtml = '';
                btnsHtml += '<button ' + (pagination.page <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (pagination.page - 1) + ')">&laquo; 上一页</button>';
                for (var i = 1; i <= totalPages; i++) {
                    if (totalPages > 7) {
                        if (i === 1 || i === totalPages || (i >= pagination.page - 2 && i <= pagination.page + 2)) {
                            btnsHtml += '<button class="' + (i === pagination.page ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
                        } else if (i === pagination.page - 3 || i === pagination.page + 3) {
                            btnsHtml += '<button disabled>...</button>';
                        }
                    } else {
                        btnsHtml += '<button class="' + (i === pagination.page ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
                    }
                }
                btnsHtml += '<button ' + (pagination.page >= totalPages ? 'disabled' : '') + ' onclick="goPage(' + (pagination.page + 1) + ')">下一页 &raquo;</button>';
                document.getElementById('paginationBtns').innerHTML = btnsHtml;
            } else {
                document.getElementById('userPagination').style.display = total > 0 ? 'flex' : 'none';
                document.getElementById('paginationInfo').textContent = '共 ' + total + ' 条记录';
                document.getElementById('paginationBtns').innerHTML = '';
            }
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">&#9888;</div><p>加载失败：' + escapeHtml(err.message) + '</p></div></td></tr>';
            document.getElementById('userPagination').style.display = 'none';
        }
    }

    function goPage(page) {
        usersPage = page;
        loadUsers();
    }

    function debounceSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            usersSearch = document.getElementById('userSearch').value.trim();
            usersPage = 1;
            loadUsers();
        }, 400);
    }

    // ==================== User Modal ====================
    function openUserModal() {
        document.getElementById('userModalTitle').textContent = '创建用户';
        document.getElementById('editUserId').value = '';
        document.getElementById('userForm').reset();
        document.getElementById('userUsername').readOnly = false;
        document.getElementById('userPassword').required = true;
        document.getElementById('passwordHint').textContent = '创建用户时必填';
        document.getElementById('userModal').classList.add('active');
    }

    async function openEditUserModal(userId) {
        document.getElementById('userModalTitle').textContent = '编辑用户';
        document.getElementById('editUserId').value = userId;
        document.getElementById('userUsername').readOnly = true;
        document.getElementById('userPassword').required = false;
        document.getElementById('userPassword').value = '';
        document.getElementById('passwordHint').textContent = '留空则不修改密码';

        try {
            var res = await api('GET', '/api/admin/users?page=1&perPage=1000');
            var users = res.data || [];
            var user = users.find(function(u) { return u.id === userId; });
            if (user) {
                document.getElementById('userUsername').value = user.username;
                document.getElementById('userRealName').value = user.real_name || '';
                document.getElementById('userCompany').value = user.company || '';
                document.getElementById('userRole').value = user.role || 'user';
                document.getElementById('userStatus').value = user.status || 'active';
            }
            document.getElementById('userModal').classList.add('active');
        } catch (err) {
            showToast('获取用户信息失败：' + err.message, 'error');
        }
    }

    function closeUserModal() {
        document.getElementById('userModal').classList.remove('active');
    }

    async function handleSaveUser(e) {
        e.preventDefault();
        var editId = document.getElementById('editUserId').value;
        var username = document.getElementById('userUsername').value.trim();
        var password = document.getElementById('userPassword').value;
        var realName = document.getElementById('userRealName').value.trim();
        var company = document.getElementById('userCompany').value.trim();
        var role = document.getElementById('userRole').value;
        var status = document.getElementById('userStatus').value;

        try {
            if (editId) {
                // Edit
                var data = { real_name: realName, company: company, role: role, status: status };
                if (password) data.password = password;
                await api('PUT', '/api/admin/users/' + editId, data);
                showToast('用户更新成功', 'success');
            } else {
                // Create
                if (!password) {
                    showToast('创建用户时密码不能为空', 'error');
                    return;
                }
                await api('POST', '/api/admin/users', {
                    username: username,
                    password: password,
                    real_name: realName,
                    company: company,
                    role: role
                });
                showToast('用户创建成功', 'success');
            }
            closeUserModal();
            loadUsers();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // ==================== Delete Modal ====================
    function openDeleteModal(userId, username) {
        deleteTargetId = userId;
        document.getElementById('deleteUserName').textContent = username;
        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        deleteTargetId = null;
    }

    async function confirmDeleteUser() {
        if (!deleteTargetId) return;
        var btn = document.getElementById('confirmDeleteBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> 删除中...';
        try {
            await api('DELETE', '/api/admin/users/' + deleteTargetId);
            showToast('用户已删除', 'success');
            closeDeleteModal();
            loadUsers();
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '删除';
        }
    }

    // ==================== Reset Password Modal ====================
    function openResetPwdModal(userId, username) {
        resetPwdTargetId = userId;
        document.getElementById('resetPwdUserName').textContent = username;
        document.getElementById('newPassword').value = '';
        document.getElementById('resetPwdModal').classList.add('active');
    }

    function closeResetPwdModal() {
        document.getElementById('resetPwdModal').classList.remove('active');
        resetPwdTargetId = null;
    }

    async function confirmResetPassword() {
        if (!resetPwdTargetId) return;
        var newPwd = document.getElementById('newPassword').value;
        if (!newPwd || newPwd.length < 6) {
            showToast('密码长度不能少于6位', 'error');
            return;
        }
        var btn = document.getElementById('confirmResetPwdBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> 重置中...';
        try {
            await api('POST', '/api/admin/users/' + resetPwdTargetId + '/reset-password', { new_password: newPwd });
            showToast('密码重置成功', 'success');
            closeResetPwdModal();
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '确认重置';
        }
    }

    // ==================== Settings ====================
    async function loadSettings() {
        try {
            var res = await api('GET', '/api/admin/settings');
            var settings = res.data || {};

            // Basic
            document.getElementById('settingSiteTitle').value = settings.site_title ? settings.site_title.value : '';
            document.getElementById('settingSiteNotice').value = settings.site_notice ? settings.site_notice.value : '';

            // Contact
            document.getElementById('settingContactInfo').value = settings.contact_info ? settings.contact_info.value : '';

            // Toggles
            var allowReg = settings.allow_register && settings.allow_register.value === 'true';
            var showAi = settings.show_ai_chat && settings.show_ai_chat.value === 'true';
            document.getElementById('settingAllowRegister').checked = allowReg;
            updateToggleLabel('AllowRegister', allowReg);
            document.getElementById('settingShowAiChat').checked = showAi;
            updateToggleLabel('ShowAiChat', showAi);
        } catch (err) {
            showToast('加载设置失败：' + err.message, 'error');
        }
    }

    function updateToggleLabel(name, checked) {
        var label = document.getElementById('toggleLabel' + name);
        if (checked) {
            label.textContent = '已开启';
            label.className = 'toggle-label on';
        } else {
            label.textContent = '已关闭';
            label.className = 'toggle-label off';
        }
    }

    // Toggle event listeners
    document.getElementById('settingAllowRegister').addEventListener('change', function() {
        updateToggleLabel('AllowRegister', this.checked);
    });
    document.getElementById('settingShowAiChat').addEventListener('change', function() {
        updateToggleLabel('ShowAiChat', this.checked);
    });

    async function saveSettings() {
        var btn = document.getElementById('saveSettingsBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> 保存中...';

        var settings = {
            site_title: document.getElementById('settingSiteTitle').value.trim(),
            site_notice: document.getElementById('settingSiteNotice').value.trim(),
            contact_info: document.getElementById('settingContactInfo').value.trim(),
            allow_register: document.getElementById('settingAllowRegister').checked ? 'true' : 'false',
            show_ai_chat: document.getElementById('settingShowAiChat').checked ? 'true' : 'false'
        };

        try {
            await api('PUT', '/api/admin/settings', settings);
            showToast('设置保存成功', 'success');
        } catch (err) {
            showToast('保存失败：' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '保存设置';
        }
    }

    // ==================== Utility ====================
    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ==================== Init ====================
    (function init() {
        var token = getToken();
        if (token) {
            // Verify token by fetching current user
            api('GET', '/api/auth/me').then(function(res) {
                currentUser = res.data;
                showAdminLayout();
            }).catch(function() {
                // Token invalid
                removeToken();
            });
        }
    })();
</script>
</body>
</html>
